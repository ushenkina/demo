version: '3.8'
services:
  web1:
    image: demo-app
    ports:
      - "8081:8080"

  web2:
    image: demo-app
    ports:
      - "8082:8080"

  web3:
    image: demo-app
    ports:
      - "8083:8080"

  nginx:
    image: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - web1
      - web2
      - web3
